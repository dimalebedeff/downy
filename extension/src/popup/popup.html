<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
  <title>YaDaun</title>
</head>
<body>
  <header>
    <div class="brand">
      <h1>YaDaun</h1>
      <button id="status-dot" class="dot dot-unknown" title="Состояние помощника"></button>
    </div>
    <button id="settings-btn" class="icon-btn" title="Настройки" aria-label="Настройки">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h.09a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h.09a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v.09a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </header>

  <div id="status-banner" hidden></div>

  <div id="settings-panel" hidden>
    <label class="field">
      Папка загрузок
      <span class="field-row">
        <input id="out-dir" placeholder="Downloads\downy">
        <button id="browse-dir" type="button" class="ghost-btn">Обзор…</button>
      </span>
    </label>
    <a id="version" class="version" target="_blank" rel="noreferrer"></a>
  </div>

  <section id="media-section">
    <div id="empty" hidden>
      <div class="empty-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <path d="M6 6l12 12"/><path d="M18 6L6 18"/>
        </svg>
      </div>
      <p class="empty-title">Найти медиа не получилось</p>
    </div>
    <ul id="media-list"></ul>
  </section>

  <section id="jobs-section" hidden>
    <h2>Загрузки</h2>
    <ul id="jobs-list"></ul>
    <button id="clear-jobs" class="link-btn">Очистить завершённые</button>
  </section>

  <footer>
    <div class="ytdlp-row" id="ytdlp-row">
      <button id="ytdlp-page">Скачать страницу через yt-dlp</button>
      <select id="ytdlp-streams" title="Какие дорожки сохранить">
        <option value="both">видео+звук</option>
        <option value="video">видео</option>
        <option value="audio">звук</option>
      </select>
    </div>
    <button id="update-btn" class="primary" hidden></button>
  </footer>

  <div id="kebab-menu" class="menu" hidden></div>

  <script src="popup.js"></script>
</body>
</html>
